version: '3.9'

services:
  # Soroban Local Network
  soroban:
    image: stellar/soroban-cli:latest
    container_name: soroban-local
    ports:
      - "8000:8000"
    environment:
      - SOROBAN_RPC_URL=http://localhost:8000
    command: soroban network start local

  # Smart Contract (this repo)
  contract:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zk-wavescout-contract
    depends_on:
      - soroban
    environment:
      - SOROBAN_RPC_URL=http://soroban:8000
    volumes:
      - ./target:/app/target
    command: soroban contract build

  # ZK Circuits (compiles proving keys)
  circuits:
    image: noir:latest
    container_name: zk-wavescout-circuits
    volumes:
      - ./circuits:/app/circuits
    working_dir: /app/circuits
    command: nargo build

  # Coordinator (event listener & relayer)
  coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: zk-wavescout-coordinator
    depends_on:
      - soroban
      - contract
    environment:
      - SOROBAN_RPC_URL=http://soroban:8000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CONTRACT_ID=${CONTRACT_ID}
    ports:
      - "3000:3000"
    volumes:
      - ./coordinator:/app

  # Frontend (WASM prover UI)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zk-wavescout-frontend
    depends_on:
      - coordinator
    environment:
      - REACT_APP_SOROBAN_URL=http://soroban:8000
      - REACT_APP_COORDINATOR_URL=http://coordinator:3000
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app

networks:
  default:
    name: zk-wavescout-network
